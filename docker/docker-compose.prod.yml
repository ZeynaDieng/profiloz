services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-profiloz}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-profiloz}
      POSTGRES_DB: ${POSTGRES_DB:-profiloz}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-profiloz}']
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-profiloz}:${POSTGRES_PASSWORD:-profiloz}@postgres:5432/${POSTGRES_DB:-profiloz}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      STORAGE_PROVIDER: local
      STORAGE_LOCAL_PATH: /app/storage
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
      APP_URL: ${APP_URL:-http://web:3000}
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium
      STRICT_PDF_READINESS: ${STRICT_PDF_READINESS:-true}
      RUN_SEED: ${RUN_SEED:-true}
      CRON_SECRET: ${CRON_SECRET:-change-me-cron-secret}
    volumes:
      - storage_data:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      web:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3001/api/v1/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
      args:
        NUXT_PUBLIC_API_BASE_URL: ${NUXT_PUBLIC_API_BASE_URL:-http://localhost/api/v1}
        NUXT_PUBLIC_APP_URL: ${NUXT_PUBLIC_APP_URL:-http://localhost}
    environment:
      NITRO_HOST: 0.0.0.0
      NITRO_PORT: 3000
      NUXT_PUBLIC_API_BASE_URL: ${NUXT_PUBLIC_API_BASE_URL:-http://localhost/api/v1}
      NUXT_API_INTERNAL_BASE_URL: ${NUXT_API_INTERNAL_BASE_URL:-http://api:3001/api/v1}
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:3000/']
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 40s
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    ports:
      - '${HTTP_PORT:-80}:80'
    volumes:
      - ./nginx/profiloz.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  storage_data:
