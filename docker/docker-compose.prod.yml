services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-profiloz}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-profiloz}
      POSTGRES_DB: ${POSTGRES_DB:-profiloz}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-profiloz}']
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-profiloz}:${POSTGRES_PASSWORD:-profiloz}@postgres:5432/${POSTGRES_DB:-profiloz}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      STORAGE_PROVIDER: local
      STORAGE_LOCAL_PATH: /app/storage
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium
      RUN_SEED: ${RUN_SEED:-true}
    volumes:
      - storage_data:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
      args:
        NUXT_PUBLIC_API_BASE_URL: ${NUXT_PUBLIC_API_BASE_URL:-http://localhost/api/v1}
        NUXT_PUBLIC_APP_URL: ${NUXT_PUBLIC_APP_URL:-http://localhost}
    environment:
      NITRO_HOST: 0.0.0.0
      NITRO_PORT: 3000
    depends_on:
      - api
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    ports:
      - '${HTTP_PORT:-80}:80'
    volumes:
      - ./nginx/profiloz.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
      - api
    restart: unless-stopped

volumes:
  postgres_data:
  storage_data:
