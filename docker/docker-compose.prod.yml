services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-profiloz}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-profiloz}
      POSTGRES_DB: ${POSTGRES_DB:-profiloz}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-profiloz}']
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-profiloz}:${POSTGRES_PASSWORD:-profiloz}@postgres:5432/${POSTGRES_DB:-profiloz}
      REDIS_URL: redis://redis:6379
      REDIS_CACHE_TTL: ${REDIS_CACHE_TTL:-3600}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      STORAGE_PROVIDER: local
      STORAGE_PERSISTENT_PATH: /app/storage/persistent
      STORAGE_TEMP_PATH: /app/storage/temp
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
      APP_URL: ${APP_URL:-http://web:3000}
      PUBLIC_APP_URL: ${PUBLIC_APP_URL:-http://localhost}
      PAYTECH_API_KEY: ${PAYTECH_API_KEY:-}
      PAYTECH_API_SECRET: ${PAYTECH_API_SECRET:-}
      PAYTECH_ENV: ${PAYTECH_ENV:-test}
      PAYTECH_IPN_URL: ${PAYTECH_IPN_URL:-}
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium
      STRICT_PDF_READINESS: ${STRICT_PDF_READINESS:-true}
      RUN_SEED: ${RUN_SEED:-true}
      CRON_SECRET: ${CRON_SECRET:-change-me-cron-secret}
    volumes:
      - storage_persistent:/app/storage/persistent
      - storage_temp:/app/storage/temp
      - storage_temp:/tmp/pdfs
    ports:
      - '${API_PORT:-3001}:3001'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3001/api/v1/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
      args:
        NUXT_PUBLIC_API_BASE_URL: ${NUXT_PUBLIC_API_BASE_URL:-http://localhost/api/v1}
        NUXT_PUBLIC_APP_URL: ${NUXT_PUBLIC_APP_URL:-http://localhost}
    environment:
      NITRO_HOST: 0.0.0.0
      NITRO_PORT: 3000
      NUXT_PUBLIC_API_BASE_URL: ${NUXT_PUBLIC_API_BASE_URL:-http://localhost/api/v1}
      NUXT_API_INTERNAL_BASE_URL: ${NUXT_API_INTERNAL_BASE_URL:-http://api:3001/api/v1}
    ports:
      - '${WEB_PORT:-3000}:3000'
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:3000/']
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 40s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  uptime-kuma:
    image: louislam/uptime-kuma:1
    ports:
      - '${UPTIME_KUMA_PORT:-3002}:3001'
    volumes:
      - uptime_kuma_data:/app/data
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
  redis_data:
  storage_persistent:
  storage_temp:
  uptime_kuma_data:
