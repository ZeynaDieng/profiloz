services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: profiloz
      POSTGRES_PASSWORD: profiloz
      POSTGRES_DB: profiloz
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U profiloz']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
