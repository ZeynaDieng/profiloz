name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Build shared packages
        run: pnpm --filter @profiloz/shared build && pnpm --filter @profiloz/validators build

      - name: Typecheck API
        run: pnpm --filter @profiloz/api typecheck

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: typecheck
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: profiloz
          POSTGRES_PASSWORD: profiloz
          POSTGRES_DB: profiloz
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U profiloz -d profiloz"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://profiloz:profiloz@localhost:5432/profiloz
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - run: pnpm --filter @profiloz/shared build && pnpm --filter @profiloz/validators build
      - run: pnpm db:migrate:deploy
      - run: pnpm --filter @profiloz/api test

  build-api:
    name: Build API
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - run: pnpm --filter @profiloz/shared build && pnpm --filter @profiloz/validators build
      - run: pnpm --filter @profiloz/api build
